<!DOCTYPE html>
<html>
<style>
    table,
    tr,
    td {
        border: 1px solid black;
        border-collapse: collapse;
    }
    table{
        width: 80%;
        text-align: center;
        margin: auto;
    }
</style>

<body>

    <h2>A basic HTML table</h2>

    <table>
        <tr>
            <td>01</td>
            <td>02</td>
            <td>03</td>
            <td>04</td>
            <td>05</td>
            <td>06</td>
        </tr>
        <tr>
            <td>11</td>
            <td colspan="5">12</td>
            <!-- <td>13</td>
            <td>14</td>
            <td>15</td>
            <td>16</td> -->
        </tr>
        <tr>
            <td>21</td>
            <td rowspan="2">22</td>
            <td colspan="3">23</td>
            <!-- <td>24</td>
            <td>25</td> -->
            <td>26</td>
        </tr>
        <tr>
            <!-- <td>31</td> -->
            <td>32</td>
            <td>33</td>
            <td>34</td>
            <td>35</td>
            <td>36</td>
        </tr>
        <tr>
            <td>41</td>
            <td>42</td>
            <td>43</td>
            <td>44</td>
            <td>45</td>
            <td rowspan="2">46</td>
        </tr>
        <tr>
            <td>51</td>
            <td>52</td>
            <td>53</td>
            <td>54</td>
            <td>55</td>
            <!-- <td>56</td> -->
        </tr>
        <tr>
            <td>61</td>
            <td colspan="5">62</td>
            <!-- <td>63</td>
            <td>64</td>
            <td>65</td>
            <td>66</td> -->
        </tr>
        <tr>
            <td>71</td>
            <td>72</td>
            <td rowspan="2">73</td>
            <td rowspan="3">74</td>
            <td rowspan="3">75</td>
            <td>76</td>
        </tr>
        <tr>
            <td>81</td>
            <td>82</td>
            <!-- <td>83</td> -->
            <!-- <td>84</td> -->
            <!-- <td>85</td> -->
            <td>86</td>

        <tr>
            <td>91</td>

            <!-- <td>95</td> -->
            <td>96</td>
        </tr>
        

    </table>

    <p>To understand the example better, we have added borders to the table.</p>

</body>

</html>
