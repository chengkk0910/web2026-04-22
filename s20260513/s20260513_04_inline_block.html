<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            /* display: inline; */
            /* display: block; */
            width: 150px;
            height: 150px;
            background-color: lightblue;
            margin-top: 10px;
        }

        span {
            /* display: block; */
            width: 150px;
            height: 150px;
            background-color: lightblue;
            margin-top: 10px;
        }

        a {
            /* display: block; */
            width: 150px;
            height: 150px;
            background-color: lightblue;
            margin-top: 10px;
        }

        img {
            /* display: block; */
            width: 150px;
            height: 150px;
            background-color: lightblue;
            margin-top: 10px;
        }

        button {
            /* width: 300px; */
            /* height: 300px; */
            /* background-color: lightblue; */
        }
    </style>
</head>

<body>
    <!-- block 換行 大小 -->
    <!-- inline 不能換行 -->
    <!-- inline-block 不能換行 可以調大小 -->


    <h3>
        block 換行 大小
    </h3>
    <!-- block 常見標籤： <div>、<h1> ~ <h6>、<p>、<ul>、<li>。 -->
    <p>
        Lorem ipsum dolor sit amet.
    </p>
    <div>
        div1 Lorem ipsum dolor sit amet.
    </div>
    <div>
        div2Lorem ipsum dolor sit amet.
    </div>

    <hr>
    <h3>
        inline 不換行 不可調整大小
    </h3>
    <!-- 常見標籤： <span>、<a>、<strong>、<em>。 -->
    <span>1</span>
    <span>2</span>
    <span>3</span>
    <span>4</span>
    <a href="">linkA</a>
    <a href="">linkB</a>
    <a href="">linkC</a>
    <hr>

    <h3>
        inline-block 不換行 可調整大小
    </h3>

    <!-- button、input、select、textarea、img-->

    <img src="https://picsum.photos/id/20/150/150" alt="">
    <img src="https://picsum.photos/id/21/150/150" alt="">
    <img src="https://picsum.photos/id/22/150/150" alt="">
    <img src="https://picsum.photos/id/23/150/150" alt="">

    <button type="button">button1</button>
    <button type="button">button2</button>
    <button type="button">button3</button>
    <button type="button">button4</button>
</body>

</html>
