<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 100%;
            height: 25vh;
            /* height: 100vh; */
            background-color: #ccc;
            clear: both;
        }

        .container11 {
            width: 100%;
            height: 100%;
            background-color: lightpink;
        }

        .container21 {
            float: right;
            /* display none 不顯示隱藏 */
            /* display: none; */
            width: 50%;
            height: 100%;
            background-color: lightblue;
        }

        .container22 {
            float: left;
            width: 50%;
            height: 100%;
            background-color: lightyellow;
        }

        /* container3 */
        .container31 {
            float: left;
            width: 33%;
            height: 100%;
            background-color: darkblue;
        }

        .container32 {
            float: left;
            width: 33%;
            height: 100%;
            background-color: darkgreen;
        }

        .container33 {
            float: right;
            width: 33%;
            height: 100%;
            background-color: darkmagenta;
        }

        /* container4 */
        /* ctrl+d 多選 */
        .container41 {
            float: left;
            width: 25%;
            height: 100%;
            background-color: lightblue;
        }

        .container42 {
            float: left;
            width: 25%;
            height: 100%;
            background-color: lightgreen;
        }

        .container43 {
            float: right;
            width: 25%;
            height: 100%;
            background-color: lightpink;
        }

        .container44 {
            float: right;
            width: 25%;
            height: 100%;
            background-color: lightyellow;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container11">

        </div>
    </div>
    <div class="container">
        <div class="container21">

        </div>
        <div class="container22">

        </div>
    </div>
    <div class="container">
        <div class="container31">

        </div>
        <div class="container32">

        </div>
        <div class="container33">

        </div>
    </div>
    <div class="container">
        <div class="container41">

        </div>
        <div class="container42">

        </div>
        <div class="container43">

        </div>
        <div class="container44">

        </div>
    </div>
</body>

</html>
