<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .box {
            /* width: 100%; */
            height: 25vh;
            background-color: lightblue;
            margin-top: 20px;
        }

        .box11 {
            background-color: lightcoral;
        }

        .box21 {
            background-color: lightseagreen;
        }

        .box22 {
            background-color: aquamarine;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="box box11">
                    11
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-6">
                <div class="box box21">
                    21
                </div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="box box22">
                    22
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-4">
                <div class="box box31">
                    31
                </div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box32">
                    32
                </div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box33">
                    33
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-6 col-sm-3">
                <div class="box box41">
                    41
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box42">
                    42
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box43">
                    43
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box44">
                    44
                </div>
            </div>
        </div>
    </div>


</body>

</html>
