<!DOCTYPE html>
<html>

<head>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: red;
            /* 原本的絕對定位是必須的，這樣 jQuery 的 top/left 才能正常運作 */
            position: absolute;
            left: 0px;
            top: 80px;
            /* 避開上方的 h1 標題 */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <h1>CSS Animation to jQuery</h1>

    <div id="box"></div>

    <script>
        $(document).ready(function () {
            // 定義一個無限循環的動畫函式
            function startAnimation() {
                $('#box')
                    // 1. 往右移到 1000px (耗時 0.75秒)
                    .animate({ left: '1000px', top: '80px' }, 750, 'linear')
                    // 2. 往下移到 580px (耗時 0.75秒)
                    .animate({ left: '1000px', top: '580px' }, 750, 'linear')
                    // 3. 往左移回 0px (耗時 0.75秒)
                    .animate({ left: '0px', top: '580px' }, 750, 'linear')
                    // 4. 往上移回原點 80px (耗時 0.75秒)，並在結束時重複呼叫自己
                    .animate({ left: '0px', top: '80px' }, 750, 'linear', function () {
                        startAnimation(); // 關鍵：動畫結束後再次執行，達到 infinite 效果
                    });
            }

            // 啟動動畫
            startAnimation();
        });
    </script>

</body>

</html>
