<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;

        }

        .box1 {
            background-color: lightblue;
            margin-left: 100px;
        }

        /* margin 有衝突 採最大值 */
        .box2 {
            background-color: lightpink;
            margin-left: 200px;
        }

        .box3 {
            background-color: lightyellow;
            margin-left: 300px;
        }

        .box4 {
            background-color: lightgreen;
            margin-left: 400px;
        }
        img:hover{
            transform: scale(1.2) rotate(5deg);
        }
    </style>
</head>

<body>
    <div class="box box1">
        <img src="https://picsum.photos/id/20/100/100" alt="">
    </div>
    <div class="box box2">
        <img src="https://picsum.photos/id/21/100/100" alt="">
    </div>
    <div class="box box3">
        <img src="https://picsum.photos/id/22/100/100" alt="">
    </div>
    <div class="box box4">
        <img src="https://picsum.photos/id/33/100/100" alt="">
    </div>
    <div class="box box3">
        <img src="https://picsum.photos/id/34/100/100" alt="">
    </div>
    <div class="box box2">
        <img src="https://picsum.photos/id/35/100/100" alt="">
    </div>
    <div class="box box1">
        <img src="https://picsum.photos/id/31/100/100" alt="">
    </div>
</body>

</html>
