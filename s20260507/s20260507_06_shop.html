<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 80%;
            margin: auto;
        }

        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
        }

        .count {
            width: 80%;
        }

        .total {
            width: 90%;
        }

        img {
            border-radius: 150px;
        }

        .result {
            height: 15vh;
            border-top: 0px;
        }

        .result-table{
            border-top: 0;
        }

        h2 {
            text-align: center;
            color: lightblue;
        }

    </style>
</head>

<body>
    <h2>美好的一天</h2>

    <table>
        <tr>
            <th width="20%">
                商品
            </th>
            <th width="10%">
                價格
            </th>
            <th width="10%">
                數量
            </th>
            <th>
                小計
            </th>
        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/id/20/150/150" alt="">
                咖啡
            </td>
            <td>
                100
            </td>
            <td>
                <input type="number" name="" id="" class="count">
            </td>
            <td>
                <input type="number" name="" id="" class="total">
            </td>
        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/id/21/150/150" alt="">
                山泉水
            </td>

                100
            </td>
            <td>
                <input type="number" name="" id="" class="count">
            </td>
            <td>

        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/id/22/150/150" alt="">
                花茶
            </td>
            <td>
                100
            </td>
            <td>
                <input type="number" name="" id="" class="count">
            </td>
            <td>
                <input type="number" name="" id="" class="total">
            </td>
        </tr>
    </table>
    <!-- <br> -->
    <table class="result-table">
        <tr>
            <td class="result">
                原始總金額:1000 , 超過500 打八折 , 800
            </td>
        </tr>
    </table>
</body>

</html>
